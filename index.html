    <script>
(function () {
  const TRACKING_STORAGE_KEY = "tracking_params";

  const TRACKING_PARAMS = [
    "utm_source",
    "utm_medium",
    "utm_campaign",
    "utm_content",
    "utm_term",
    "gclid",
    "fbclid",
    "ad_id",
    "li_fat_id"
  ];

  try {
    const params = new URLSearchParams(window.location.search);

    const existingRaw = localStorage.getItem(TRACKING_STORAGE_KEY);
    const existing = existingRaw ? JSON.parse(existingRaw) : {};

    const updated = { ...existing };

    TRACKING_PARAMS.forEach(function (key) {
      const value = params.get(key);

      if (value && value.trim() !== "") {
        updated[key] = value.trim();
      }
    });

    localStorage.setItem(
      TRACKING_STORAGE_KEY,
      JSON.stringify(updated)
    );

  } catch (error) {
    console.error("Error capturing tracking params:", error);
  }
})();
</script>
